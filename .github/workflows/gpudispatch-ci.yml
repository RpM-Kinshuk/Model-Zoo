name: gpudispatch-ci

on:
  pull_request:
    paths:
      - "gpudispatch/**"
      - ".github/workflows/gpudispatch-ci.yml"
      - ".github/workflows/gpudispatch-release.yml"
  push:
    branches:
      - main
    paths:
      - "gpudispatch/**"
      - ".github/workflows/gpudispatch-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpudispatch-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: gpudispatch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: gpudispatch/pyproject.toml

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit -q

  package-smoke:
    name: package build smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gpudispatch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gpudispatch/pyproject.toml

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Install wheel artifact
        run: python -m pip install dist/*.whl

      - name: Import package from installed wheel
        run: python -c "import gpudispatch; print(gpudispatch.__version__)"
